name: Make DashBoard V1
on:
  workflow_dispatch:
  push:
    paths:
      - 'summary-repo/data/*.json'

jobs:
  build-dashboard:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    # ジョブレベルで Node.js 24 を強制する環境変数を設定
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5 # 今後 v5 等が出ればそちらに更新を推奨

      - name: Generate Summary Table
        run: |
          echo "## 🛡️ 組織内セキュリティ・ダッシュボード" > README.md
          echo "最終更新日: $(date +'%Y-%m-%d %H:%M')" >> README.md
          echo "" >> README.md
          echo "| リポジトリ | Critical | High | Medium | スキャン日 |" >> README.md
          echo "| :--- | :---: | :---: | :---: | :--- |" >> README.md
          
          # フォルダが存在しない場合のエラー防止
          mkdir -p summary-repo/data/
          
          for f in summary-repo/data/*.json; do
            # ファイルが存在しない場合はスキップ
            [ -e "$f" ] || continue
            
            REPO_NAME=$(basename "$f" .json)
            
            # jq の処理をまとめて効率化
            STATS=$(jq -r '
              [ .Results[].Vulnerabilities[]? ] as $v |
              {
                crit: ($v | map(select(.Severity=="CRITICAL")) | length),
                high: ($v | map(select(.Severity=="HIGH")) | length),
                med:  ($v | map(select(.Severity=="MEDIUM")) | length),
                date: (.Metadata.CreatedAt // .Metadata.NextUpdate // "N/A")
              }' "$f")

            CRIT=$(echo "$STATS" | jq -r '.crit')
            HIGH=$(echo "$STATS" | jq -r '.high')
            MED=$(echo "$STATS" | jq -r '.med')
            DATE=$(echo "$STATS" | jq -r '.date' | cut -d'T' -f1)

            CRIT_DISPLAY="**$CRIT**"
            HIGH_DISPLAY="$HIGH"
            REPO_DISPLAY="$REPO_NAME"

            if [ "$CRIT" -gt 0 ]; then
              CRIT_DISPLAY="⚠️ **$CRIT**"
              REPO_DISPLAY="❗ $REPO_NAME"
            elif [ "$HIGH" -gt 0 ]; then
              # Critical が 0 かつ High が 0 より大きい場合
              HIGH_DISPLAY="⚠️ $HIGH"
              REPO_DISPLAY="❗ $REPO_NAME"
            fi

            echo "| $REPO_DISPLAY | $CRIT_DISPLAY | $HIGH_DISPLAY | $MED | $DATE |" >> README.md
          done
          
          # 変更がある場合のみ push する設定（差分チェック）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "docs: update security dashboard"
            git push
          fi
