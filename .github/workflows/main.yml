name: Make DashBoad V1
# 集計用リポジトリの .github/workflows/update-dashboard.yml
on:
  workflow_dispatch:
  push:
    paths:
      - 'summary-repo/data/*.json'

jobs:
  build-dashboard:
    permissions:           # ← これを追加
      contents: write      # ← これを追加
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Summary Table
        run: |
          echo "## 🛡️ 組織内セキュリティ・ダッシュボード" > README.md
          echo "最終更新日: $(date +'%Y-%m-%d %H:%M')" >> README.md
          echo "" >> README.md
          echo "| リポジトリ | Critical | High | Medium | スキャン日 |" >> README.md
          echo "| :--- | :---: | :---: | :---: | :--- |" >> README.md
          
          # jqを使って各JSONから数字を抽出してテーブルに追加
          for f in summary-repo/data/*.json; do
            REPO_NAME=$(basename $f .json)
            CRIT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' $f)
            HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' $f)
            MED=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' $f)

            # アイコンの判定用変数
            CRIT_DISPLAY="**$CRIT**"
            HIGH_DISPLAY="$HIGH"
            REPO_DISPLAY="$REPO_NAME"

            # Critical が 0 より大きい場合：数値に ⚠️ を付け、リポジトリ名に ❗ を付ける
            if [ "$CRIT" -gt 0 ]; then
              CRIT_DISPLAY="⚠️ **$CRIT**"
              REPO_DISPLAY="❗ $REPO_NAME"
            fi

            # High が 0 より大きい場合：数値に ⚠️ を付ける（Criticalがない場合でもHighがあれば警告）
            if [ "$HIGH" -gt 0 ]; then
              HIGH_DISPLAY="⚠️ $HIGH"
              # Criticalが0でもHighがあればリポジトリ名に ❗ を付ける
              [ "$CRIT" -eq 0 ] && REPO_DISPLAY="❗ $REPO_NAME"
            fi

            # 日付の抽出
            DATE_RAW=$(jq -r '.Metadata.CreatedAt // .Metadata.NextUpdate // empty' $f)
            DATE=$(echo ${DATE_RAW:-N/A} | cut -d'T' -f1)
            
            # テーブルへの書き出し（判定済みの変数を使用）
            echo "| $REPO_DISPLAY | $CRIT_DISPLAY | $HIGH_DISPLAY | $MED | $DATE |" >> README.md
          done
          
          git config user.name "Dashboard Bot"
          git config user.email "bot@example.com"
          git add README.md
          git commit -m "Update Dashboard"
          git push
